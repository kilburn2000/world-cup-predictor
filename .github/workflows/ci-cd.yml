# CI/CD for the World Cup predictor (React/Vite web + Node/tsx API + Postgres,
# shipped as one Docker image).
#
# Flow: on every push/PR to main -> lint, type-check, test (with a Postgres
# service), Fallow audit, Vite build. On push to main only -> build the Docker
# image tagged with the commit SHA, push to GHCR, then SSH to the deploy host to
# run migrations, pull + start the new container (health-gated), and smoke-test.
#
# Required repository SECRETS (Settings -> Secrets and variables -> Actions):
#   DEPLOY_HOST      - host/IP of the docker-compose server
#   DEPLOY_USER      - SSH user on that host
#   DEPLOY_SSH_KEY   - private SSH key for that user (PEM)
#   DEPLOY_PATH      - dir on the host holding docker-compose.prod.yml + .env
#   APP_HEALTH_URL   - public health URL, e.g. https://towtonworldcup.com/api/health
#   DEPLOY_SSH_PORT  - (optional) SSH port, defaults to 22
# GHCR uses the built-in GITHUB_TOKEN (no secret to create).
#
# Host prerequisites: Docker + compose plugin installed, this repo's
# docker-compose.prod.yml present in DEPLOY_PATH, and a .env there holding the
# real DATABASE_URL + app secrets (ANTHROPIC_API_KEY, ADMIN_*, etc.).

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: Lint, type-check, test, audit, build
    runs-on: ubuntu-latest
    # Postgres service for any tests that hit the database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: worldcup
          POSTGRES_PASSWORD: worldcup
          POSTGRES_DB: worldcup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U worldcup -d worldcup_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://worldcup:worldcup@localhost:5432/worldcup_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Fallow can diff the branch against main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run type-check

      - name: Test (Vitest)
        run: npm test

      # Fails the build if Fallow reports issues. NOTE: requires `fallow` to be
      # installable in CI (published to a registry the runner can reach). If it
      # is private, add an npm auth step / token secret before this runs.
      - name: Fallow audit
        run: npx --yes fallow audit --base main --format json --quiet

      - name: Production build (Vite)
        run: npm run build

  build-and-push:
    name: Build & push image
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name (lowercased for GHCR)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (tagged with the commit SHA)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Migrate & deploy
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      # Steps 9 + 10: on the host, log in to GHCR, pull the SHA-tagged image, run
      # pending migrations with it, then start the new container and wait for its
      # health check to pass before this step succeeds.
      - name: Migrate & deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            export IMAGE_TAG="${{ github.sha }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            # 9. run pending migrations with the new image against the live db
            docker compose -f docker-compose.prod.yml up -d db
            docker compose -f docker-compose.prod.yml run --rm app npm run db:push
            # 10. start the new app container; --wait blocks until it is healthy
            #     (the image's HEALTHCHECK), so an unhealthy release fails here
            docker compose -f docker-compose.prod.yml up -d --wait app
            docker logout ghcr.io
            docker image prune -f

      # Step 11: independent post-deploy smoke test against the public endpoint.
      - name: Post-deploy smoke test
        run: |
          for i in $(seq 1 10); do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' "${{ secrets.APP_HEALTH_URL }}" || true)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then echo "healthy"; exit 0; fi
            sleep 6
          done
          echo "health endpoint never returned 200"; exit 1
