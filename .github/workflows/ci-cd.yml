# CI/CD for the World Cup predictor (React/Vite web + Node/tsx API + Postgres).
#
# Push-to-deploy: on push to main, run the quality gate (lint, type-check, test
# with a Postgres service, Fallow audit, Vite build); if it all passes, the
# `deploy` job fires Render's deploy hook. A red build never deploys - prod stays
# on the last good release. PRs run the gate only (no deploy).
#
# Render itself must have Auto-Deploy turned OFF (so only this workflow deploys)
# and the deploy hook URL stored as the RENDER_DEPLOY_HOOK repo secret.
#
# Migrations run automatically inside the container on boot (the idempotent
# migration block in server/src/index.ts) - no db:push step here, because
# drizzle-kit push can be destructive against the live schema.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test, audit, build
    runs-on: ubuntu-latest
    # Postgres service for any tests that hit the database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: worldcup
          POSTGRES_PASSWORD: worldcup
          POSTGRES_DB: worldcup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U worldcup -d worldcup_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://worldcup:worldcup@localhost:5432/worldcup_test
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so Fallow can diff the branch against main

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run type-check

      - name: Test (Vitest)
        run: npm test

      # Fallow audit. Currently NON-BLOCKING (continue-on-error) until we confirm
      # `fallow` installs in CI - flip continue-on-error to false to make it a
      # hard gate that fails the build on issues, as originally specced.
      - name: Fallow audit
        continue-on-error: true
        run: npx --yes fallow audit --base main --format json --quiet

      - name: Production build (Vite)
        run: npm run build

  # Deploy only runs after `quality` passes, and only on a push to main (never on
  # PRs). It fires Render's deploy hook; Render then builds the image, runs the
  # boot migrations, and health-checks /api/health before switching traffic. A
  # failed quality job means this never runs, so a red build never deploys.
  deploy:
    name: Deploy to Render
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" > /dev/null
          echo "Render deploy triggered - it will build, migrate on boot, and health-check /api/health before going live."
