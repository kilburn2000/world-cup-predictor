# CI for the World Cup predictor (React/Vite web + Node/tsx API + Postgres).
#
# Deployment (CD) is handled by RENDER, which builds the Docker image from this
# repo's Dockerfile and deploys on push to main. This workflow is the quality
# GATE: lint, type-check, test (with a Postgres service), Fallow audit, and the
# Vite build. Make it a required status check (branch protection on main, or
# Render's "Wait for CI checks to pass") so Render only ships green commits.
#
# Migrations run automatically inside the container on boot (the idempotent
# migration block in server/src/index.ts) - no db:push step here, because
# drizzle-kit push can be destructive against the live schema.

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type-check, test, audit, build
    runs-on: ubuntu-latest
    # Postgres service for any tests that hit the database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: worldcup
          POSTGRES_PASSWORD: worldcup
          POSTGRES_DB: worldcup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U worldcup -d worldcup_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://worldcup:worldcup@localhost:5432/worldcup_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so Fallow can diff the branch against main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npm run type-check

      - name: Test (Vitest)
        run: npm test

      # Fails the build if Fallow reports issues. NOTE: requires `fallow` to be
      # installable in CI (published to a registry the runner can reach). If it
      # is private, add an npm auth step / token secret before this runs.
      - name: Fallow audit
        run: npx --yes fallow audit --base main --format json --quiet

      - name: Production build (Vite)
        run: npm run build
