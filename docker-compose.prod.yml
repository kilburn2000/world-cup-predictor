# Production compose for the deploy host (used by .github/workflows/ci-cd.yml).
# Unlike docker-compose.yml (which builds locally), this PULLS the pre-built
# image from GHCR by tag. The CI deploy job exports IMAGE_TAG=<commit sha>.
#
# On the host, alongside this file, keep a .env holding the real secrets:
#   DATABASE_URL=postgres://worldcup:worldcup@db:5432/worldcup
#   POSTGRES_USER=worldcup / POSTGRES_PASSWORD=... / POSTGRES_DB=worldcup
#   ANTHROPIC_API_KEY=... ADMIN_TOKEN=... ADMIN_EMAIL=... ADMIN_PASSWORD_HASH=...
#   FOOTBALL_DATA_TOKEN=... VISION_MODEL=claude-sonnet-4-6
# (To use an external managed Postgres instead, drop the `db` service and point
#  DATABASE_URL at it.)

services:
  app:
    image: ghcr.io/kilburn2000/world-cup-predictor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8790:8790"
    environment:
      NODE_ENV: production
      PORT: 8790
    # DATABASE_URL + app secrets come from the host-managed .env, never the repo.
    env_file:
      - path: .env
        required: true
    depends_on:
      db:
        condition: service_healthy
    # Lets `docker compose up --wait` gate the deploy on a healthy release.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8790)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worldcup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worldcup}
      POSTGRES_DB: ${POSTGRES_DB:-worldcup}
    volumes:
      - wc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-worldcup} -d ${POSTGRES_DB:-worldcup}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wc-pgdata:
