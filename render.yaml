# Render Blueprint. You can apply this whole file (Render → New → Blueprint) to
# provision both services, OR just use it as the reference for configuring the
# web service you've already created (see DEPLOY.md).
#
# NOTE: the `free` plans spin down on inactivity — when the web service sleeps,
# the live-score poller stops, so live updates pause. For the tournament use a
# paid instance (e.g. `starter`) so it stays awake.

databases:
  - name: wc-predictor-db
    databaseName: worldcup
    user: worldcup
    plan: free

services:
  - type: web
    name: world-cup-predictor
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wc-predictor-db
          property: connectionString
      - key: VISION_MODEL
        value: claude-sonnet-4-6
      # Secrets — set these in the Render dashboard, not in this file:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: FOOTBALL_DATA_TOKEN
        sync: false
